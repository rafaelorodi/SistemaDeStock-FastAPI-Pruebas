services:

  # Gateway (Nginx)
  nginx:
    build: ./nginx
    container_name: qa-gateway
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - default
      - qa-network
    restart: always

  # Tu API de FastAPI
  backend:
    build: ./backend
    container_name: sut-backend
    volumes:
      # Volumen bind: monta la carpeta local del backend en /code para que vea qa_automation.db
      - ./backend:/code
    environment:
      - DATABASE_URL=sqlite:////code/qa_automation.db
    networks:
      - default
      - qa-network
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend-qa
    container_name: sut-frontend
    depends_on:
      - backend
    networks:
      - default
      - qa-network
    ports:
      - "5180:80"
    

volumes:
  db-data:

networks:
  default:
    driver: bridge
  qa-network:
    external: true
    name: qa-ecosystem_qa-network


