services:

  # Tu API de FastAPI
  backend:
    build: ./backend
    container_name: sut-backend
    ports:
      - "8001:8000"
    volumes:
      # Persistir solo la base de datos, no sobreescribir el código del contenedor
      - db-data:/code/data
    environment:
      - DATABASE_URL=sqlite:////code/data/qa_automation.db
    networks:
      - default
      - monitoring

  frontend:
    build: ./frontend-qa
    container_name: sut-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db-data:

networks:
  monitoring:
    name: qa-monitoring
    external: true

