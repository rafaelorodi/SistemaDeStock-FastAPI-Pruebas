services:

  # Gateway (Nginx)
  nginx:
    build: ./nginx
    container_name: qa-gateway
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - default
      - cloudflare_network
    restart: always

  # Tu API de FastAPI
  backend:
    build: ./backend
    container_name: sut-backend
    volumes:
      # Persistir solo la base de datos, no sobreescribir el código del contenedor
      - db-data:/code/data
    environment:
      - DATABASE_URL=sqlite:////code/data/qa_automation.db
    networks:
      - default
      - cloudflare_network

  frontend:
    build: ./frontend-qa
    container_name: sut-frontend
    depends_on:
      - backend
    networks:
      - default
      - cloudflare_network
    

volumes:
  db-data:

networks:
  default:
    driver: bridge
  cloudflare_network:
    external: true
    name: cloudflare_network


