worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;

        # Redirigir la raíz al frontend
        location / {
            proxy_pass http://sut-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Redirigir el tráfico /api/ al backend FastAPI
        location /api/ {
            # Se usa la barra al final para que Nginx elimine el prefijo /api antes de enviarlo al backend
            # El backend escucha en puerto 8000 dentro de la red Docker
            proxy_pass http://sut-backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
