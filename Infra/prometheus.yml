global:
  scrape_interval: 15s

scrape_configs:
  # Job para ver la Raspberry (CPU, RAM, etc.)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Job para ver tu API de FastAPI
  - job_name: "backend-metrics"
    static_configs:
      - targets: ["backend:8000"]