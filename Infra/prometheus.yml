global:
  scrape_interval: 15s

scrape_configs:
  # 1. Monitoreo de la Raspberry (CPU, RAM, Disco)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # 2. Monitoreo de tu API FastAPI
  - job_name: "backend-metrics"
    static_configs:
      - targets: ["sut-backend:8000"]

  # 3. Monitoreo del propio Prometheus (Auto-diagnóstico)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]